# fly.toml app configuration file generated for iroh-bot on 2026-06-14T02:12:08Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'iroh-bot'
primary_region = 'iad'

[build]

[env]
  LOG_LEVEL = 'info'
  NODE_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
