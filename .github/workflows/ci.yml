name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: iroh
          POSTGRES_PASSWORD: iroh_secret
          POSTGRES_DB: iroh_bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U iroh"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - run: npm test
        env:
          DATABASE_URL: postgres://iroh:iroh_secret@localhost:5432/iroh_bot
