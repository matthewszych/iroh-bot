services:
  postgres:
    image: postgres:16-alpine
    container_name: iroh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: iroh
      POSTGRES_PASSWORD: iroh_secret
      POSTGRES_DB: iroh_bot
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
